version: "3.8"

services:

  database:
    image: postgres:15
    environment:
      POSTGRES_DB: tp2db
      POSTGRES_USER: tp2user
      POSTGRES_PASSWORD: tp2pass
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: tp2db
      DB_USER: tp2user
      DB_PASSWORD: tp2pass
      PORT: 3000
    depends_on:
      - database
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    depends_on:
      - database

volumes:
  db_data: